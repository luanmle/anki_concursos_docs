name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: anki_test
          POSTGRES_USER: anki
          POSTGRES_PASSWORD: anki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anki -d anki_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://anki:anki@localhost:5432/anki_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -c constraints.txt ".[dev]"
      - run: ruff check app tests migrations
      - run: python -m compileall -q app tests migrations
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
      - run: alembic upgrade head --sql > /dev/null
