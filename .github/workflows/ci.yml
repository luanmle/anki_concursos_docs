name: CI

on:
  push:
    branches-ignore:
      - admin-deploy
  pull_request:
    branches-ignore:
      - admin-deploy

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: anki_test
          POSTGRES_USER: anki
          POSTGRES_PASSWORD: anki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anki -d anki_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://anki:anki@localhost:5432/anki_test

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -c constraints.txt ".[dev]"
      - run: ruff check app tests migrations
      - run: python -m compileall -q app tests migrations
      - name: Run backend tests with coverage
        run: |
          coverage run --source=app -m pytest -m "not postgres"
          coverage report --show-missing --fail-under=80
      - name: Run PostgreSQL integration tests
        run: pytest -m postgres
      - run: alembic upgrade head --sql > /dev/null

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
