services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: anki_concursos
      POSTGRES_USER: anki
      POSTGRES_PASSWORD: anki
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anki -d anki_concursos"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://anki:anki@db:5432/anki_concursos
      REDIS_URL: redis://redis:6379/0
      ADMIN_API_KEY: development-admin-key
      ALLOW_LEGACY_ADMIN_API_KEY: "true"
      AUTH_SECRET_KEY: development-auth-secret-change-me
      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_PASSWORD: development-password
    command: >
      sh -c "python -m app.operations.predeploy &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
